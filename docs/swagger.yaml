  /api/v1/exercises/analyze-text:
    post:
      consumes:
      - application/json
      description: "Sends text to the Python analyzer service for NLP analysis including:\ngibberish
        detection, sentence structure, vocabulary richness, readability,\nsemantic
        requirement matching, and weighted score calculation.\n\n**Ejemplo de request:**\n```json\n{\n\"text\":
        \"El liderazgo es una habilidad fundamental...\",\n\"requirements\": [\"Incluir
        una introducción\", \"Dar ejemplos concretos\"],\n\"min_words\": 100,\n\"max_words\":
        500\n}\n```\n\n**Respuesta:** `score` (0-100), `score_breakdown` con cada
        componente\n(cobertura_requisitos 30%, estructura 25%, calidad_linguistica
        25%,\nlongitud 20%), `gibberish_detected`, métricas y retroalimentación.\n\n\U0001F512
        Requires JWT token (Authorization: Bearer <token>)"
      parameters:
      - description: Text to analyze
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/controllers.AnalyzeTextInput'
      produces:
      - application/json
      responses:
        "200":
          description: Análisis completo del texto
          schema:
            $ref: '#/definitions/resources.AnalyzeTextResponse'
        "400":
          description: Texto vacío o datos inválidos
          schema:
            $ref: '#/definitions/resources.BadRequestError'
        "401":
          description: Token no proporcionado o inválido
          schema:
            $ref: '#/definitions/resources.UnauthorizedError'
        "502":
          description: Analizador NLP no disponible — intente más tarde
          schema:
            $ref: '#/definitions/resources.ServiceUnavailableError'
      security:
      - BearerAuth: []
      summary: Analyze text for writing exercises
      tags:
      - Exercises
