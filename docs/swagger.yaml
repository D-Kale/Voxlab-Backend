          schema:
            $ref: '#/definitions/resources.InternalServerError'
      security:
      - BearerAuth: []
      summary: Link a lesson to a module
      tags:
      - Modules
  /api/v1/progress:
    get:
      description: "Returns ALL progress records for the authenticated user (every
        lesson they've started or completed).\nEach record shows: status (in_progress/completed),
        xp_earned, and timestamps.\nUse this on the frontend to determine which lessons
        are completed and show user progress bars.\n\n\U0001F512 Requires JWT token
        (Authorization: Bearer <token>)"
      produces:
      - application/json
      responses:
        "200":
          description: Registros de progreso del usuario
          schema:
            $ref: '#/definitions/resources.ListProgressResponse'
        "401":
          description: Token no proporcionado o inválido
          schema:
            $ref: '#/definitions/resources.UnauthorizedError'
        "500":
          description: Error al obtener el progreso
          schema:
            $ref: '#/definitions/resources.InternalServerError'
      security:
      - BearerAuth: []
      summary: Get my learning progress
      tags:
      - Progress
    post:
      consumes:
      - application/json
      description: "Marks a lesson as completed for the authenticated user. This endpoint:\n1.
        Sets the progress status to \"completed\"\n2. Adds XP to the user's total
        (calculated from exercises + score)\n3. Stores the completion timestamp\n\nIf
        the lesson was already completed before, it UPDATES the existing record\n(the
        final score replaces the previous one).\n\n\U0001F512 Requires JWT token (Authorization:
        Bearer <token>)"
      parameters:
      - description: Lesson completion data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/controllers.completeLessonRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Progreso actualizado — lección completada
          schema:
            $ref: '#/definitions/resources.CompleteProgressResponse'
        "400":
          description: Datos inválidos — lesson_id requerido
          schema:
            $ref: '#/definitions/resources.BadRequestError'
        "401":
          description: Token no proporcionado o inválido
          schema:
            $ref: '#/definitions/resources.UnauthorizedError'
        "404":
          description: Lección no encontrada
          schema:
            $ref: '#/definitions/resources.NotFoundError'
        "500":
          description: Error al completar la lección
          schema:
            $ref: '#/definitions/resources.InternalServerError'
      security:
      - BearerAuth: []
      summary: Complete a lesson
      tags:
      - Progress
  /api/v1/reactions:
    post:
      consumes:
      - application/json
      description: "⚠️ NOT YET IMPLEMENTED — placeholder endpoint.\nThis will allow
        users to send reactions (emojis/likes) during\nlive practice sessions. Reactions
        are stored with a 30-day TTL\nand automatically cleaned up by pg_cron.\n\n\U0001F512
        Requires JWT token (Authorization: Bearer <token>)"
      produces:
      - application/json
      responses:
        "501":
          description: Funcionalidad no implementada aún
          schema:
            $ref: '#/definitions/resources.NotImplementedResponse'
      security:
      - BearerAuth: []
      summary: '[TODO] Create a reaction (emoji/like) during live sessions'
      tags:
      - Reactions
  /api/v1/tracks:
    get:
      description: "Returns ALL available tracks with their modules, lessons, and
        exercises nested inside.\nThis is the main endpoint for the course catalog
        — frontends should call this once\nto build the full navigation tree. Each
        track contains modules, each module contains\nlessons (through the pivot table),
        and each lesson contains exercises.\n\n\U0001F513 Public — no authentication
        required."
      produces:
      - application/json
      responses:
        "200":
          description: Lista de todos los tracks
          schema:
            $ref: '#/definitions/resources.ListTracksResponse'
        "500":
          description: Error al obtener los tracks
          schema:
            $ref: '#/definitions/resources.InternalServerError'
      summary: List all educational tracks
      tags:
      - Tracks (Educational Content)
    post:
      consumes:
      - application/json
      description: "Adds a new educational track (course) to the catalog.\nAfter creating
        a track, you can add modules to it using POST /api/v1/modules.\n\n\U0001F512
        Requires JWT token (Authorization: Bearer <token>)"
      parameters:
      - description: Track data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/controllers.CreateTrackRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Track creado correctamente
          schema:
            $ref: '#/definitions/resources.CreateTrackResponse'
        "400":
          description: Datos inválidos — el título es requerido
          schema:
            $ref: '#/definitions/resources.BadRequestError'
        "401":
          description: Token no proporcionado o inválido
          schema:
            $ref: '#/definitions/resources.UnauthorizedError'
        "500":
          description: Error al crear el track
          schema:
            $ref: '#/definitions/resources.InternalServerError'
      security:
      - BearerAuth: []
      summary: Create a new track
      tags:
      - Tracks (Educational Content)
  /api/v1/tracks/{id}:
    delete:
      description: "Permanently removes a track and all its associated modules and
        module-lesson links.\n⚠️ This action cannot be undone.\n\n\U0001F512 Requires
        JWT token (Authorization: Bearer <token>)"
      parameters:
      - description: Track ID (e.g. 1)
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Track eliminado correctamente
          schema:
            $ref: '#/definitions/resources.DeleteTrackResponse'
        "400":
          description: ID de track inválido
          schema:
            $ref: '#/definitions/resources.BadRequestError'
        "401":
          description: Token no proporcionado o inválido
          schema:
            $ref: '#/definitions/resources.UnauthorizedError'
        "404":
          description: Track no encontrado
          schema:
            $ref: '#/definitions/resources.NotFoundError'
        "500":
          description: Error al eliminar el track
          schema:
            $ref: '#/definitions/resources.InternalServerError'
      security:
      - BearerAuth: []
      summary: Delete a track
      tags:
      - Tracks (Educational Content)
    get:
      description: "Returns one track with its nested modules, lessons, and exercises.\nUse
        this when you need to reload or fetch details for a specific track.\n\n\U0001F513
        Public — no authentication required."
      parameters:
      - description: Track ID (e.g. 1)
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Track con módulos, lecciones y ejercicios
          schema:
            $ref: '#/definitions/resources.GetTrackResponse'
        "400":
          description: ID de track inválido
          schema:
            $ref: '#/definitions/resources.BadRequestError'
        "404":
          description: Track no encontrado
          schema:
            $ref: '#/definitions/resources.NotFoundError'
      summary: Get a single track by ID
      tags:
      - Tracks (Educational Content)
    put:
      consumes:
      - application/json
      description: "Modifies the title, description, or icon of a track.\nSend only
        the fields you want to change.\n\n\U0001F512 Requires JWT token (Authorization:
        Bearer <token>)"
      parameters:
      - description: Track ID (e.g. 1)
        in: path
        name: id
        required: true
        type: integer
      - description: Track fields to update
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/controllers.UpdateTrackRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Track actualizado correctamente
          schema:
            $ref: '#/definitions/resources.UpdateTrackResponse'
        "400":
          description: ID de track inválido o datos incorrectos
          schema:
            $ref: '#/definitions/resources.BadRequestError'
        "401":
          description: Token no proporcionado o inválido
          schema:
            $ref: '#/definitions/resources.UnauthorizedError'
        "404":
          description: Track no encontrado
          schema:
            $ref: '#/definitions/resources.NotFoundError'
        "500":
          description: Error al actualizar el track
          schema:
            $ref: '#/definitions/resources.InternalServerError'
      security:
      - BearerAuth: []
      summary: Update an existing track
      tags:
      - Tracks (Educational Content)
  /api/v1/tracks/{id}/modules:
    get:
      description: "Returns all modules belonging to a specific track, ordered by
        order_index.\nEach module includes its linked lessons and their exercises.\n\n\U0001F513
        Public — no authentication required."
      parameters:
      - description: Track ID (e.g. 1)
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Módulos del track
          schema:
            $ref: '#/definitions/resources.ListModulesResponse'
        "400":
          description: ID de track inválido
          schema:
            $ref: '#/definitions/resources.BadRequestError'
        "500":
          description: Error al obtener los módulos
          schema:
            $ref: '#/definitions/resources.InternalServerError'
      summary: List modules for a track
      tags:
      - Modules
  /api/v1/upload/avatar:
    post:
      consumes:
      - multipart/form-data
      description: |-
        Uploads and sets the authenticated user's avatar image. WebP optimized, max 2MB, 400x400.
        The old avatar is deleted from storage automatically.
      parameters:
      - description: Avatar image (JPEG/PNG, max 2MB)
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: Avatar actualizado correctamente
          schema:
            $ref: '#/definitions/resources.UploadFileResponse'
        "400":
          description: Archivo faltante o excede el tamaño máximo
          schema:
            $ref: '#/definitions/resources.BadRequestError'
        "401":
          description: Token no proporcionado o inválido
          schema:
            $ref: '#/definitions/resources.UnauthorizedError'
        "500":
          description: Error al subir o procesar el avatar
          schema:
            $ref: '#/definitions/resources.InternalServerError'
      security:
      - BearerAuth: []
      summary: Upload user avatar
      tags:
      - Upload
  /api/v1/upload/lesson/{id}:
    post:
      consumes:
      - multipart/form-data
      description: Same as track upload but for a lesson's image_url. WebP optimized,
        max 2MB, 1920x1080.
      parameters:
      - description: Lesson ID
        in: path
        name: id
        required: true
        type: integer
      - description: Image file (JPEG/PNG, max 2MB)
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: Imagen subida correctamente
          schema:
            $ref: '#/definitions/resources.UploadFileResponse'
        "400":
          description: ID de lección inválido o archivo faltante
          schema:
            $ref: '#/definitions/resources.BadRequestError'
        "401":
          description: Token no proporcionado o inválido
          schema:
            $ref: '#/definitions/resources.UnauthorizedError'
        "403":
          description: Solo administradores pueden subir imágenes
          schema:
            $ref: '#/definitions/resources.ForbiddenError'
        "500":
          description: Error al subir o procesar la imagen
          schema:
            $ref: '#/definitions/resources.InternalServerError'
      security:
      - BearerAuth: []
      summary: Upload lesson image
      tags:
      - Upload
  /api/v1/upload/module/{id}:
    post:
      consumes:
      - multipart/form-data
      description: Same as track upload but for a module's image_url. WebP optimized,
        max 2MB, 1920x1080.
      parameters:
      - description: Module ID
        in: path
        name: id
        required: true
        type: integer
      - description: Image file (JPEG/PNG, max 2MB)
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: Imagen subida correctamente
          schema:
            $ref: '#/definitions/resources.UploadFileResponse'
        "400":
          description: ID de módulo inválido o archivo faltante
          schema:
            $ref: '#/definitions/resources.BadRequestError'
        "401":
          description: Token no proporcionado o inválido
          schema:
            $ref: '#/definitions/resources.UnauthorizedError'
        "403":
          description: Solo administradores pueden subir imágenes
          schema:
            $ref: '#/definitions/resources.ForbiddenError'
        "500":
          description: Error al subir o procesar la imagen
          schema:
            $ref: '#/definitions/resources.InternalServerError'
      security:
      - BearerAuth: []
      summary: Upload module image
      tags:
      - Upload
  /api/v1/upload/track/{id}:
    post:
      consumes:
      - multipart/form-data
      description: |-
        Accepts an image file (JPEG/PNG), optimizes it to WebP (quality 80), and uploads to MinIO.
        The track's icon_url is updated automatically. The old image is deleted from storage.
        Max file size: 2MB. Image is resized to fit 1920x1080 while preserving aspect ratio.
      parameters:
      - description: Track ID
        in: path
        name: id
        required: true
        type: integer
      - description: Image file (JPEG/PNG, max 2MB)
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: Imagen subida correctamente
          schema:
            $ref: '#/definitions/resources.UploadFileResponse'
        "400":
          description: ID de track inválido o archivo faltante
          schema:
            $ref: '#/definitions/resources.BadRequestError'
        "401":
          description: Token no proporcionado o inválido
          schema:
            $ref: '#/definitions/resources.UnauthorizedError'
        "403":
          description: Solo administradores pueden subir imágenes
          schema:
            $ref: '#/definitions/resources.ForbiddenError'
        "500":
          description: Error al subir o procesar la imagen
          schema:
            $ref: '#/definitions/resources.InternalServerError'
      security:
      - BearerAuth: []
      summary: Upload track image
      tags:
      - Upload
  /api/v1/users:
    get:
      description: Returns all registered users. Admin only. Includes profile data
        (name, email, XP, streak).
      produces:
      - application/json
      responses:
        "200":
          description: Lista de todos los usuarios
          schema:
            $ref: '#/definitions/resources.ListUsersResponse'
        "401":
          description: Token no proporcionado o inválido
          schema:
            $ref: '#/definitions/resources.UnauthorizedError'
        "403":
          description: Solo administradores pueden listar usuarios
          schema:
            $ref: '#/definitions/resources.ForbiddenError'
        "500":
          description: Error al obtener los usuarios
          schema:
            $ref: '#/definitions/resources.InternalServerError'
      security:
      - BearerAuth: []
      summary: List all users (admin)
      tags:
      - Users
  /api/v1/users/{id}:
    delete:
      description: Permanently removes a user account. Admin only. ⚠️ This cannot
        be undone.
      parameters:
      - description: User ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Usuario eliminado correctamente
          schema:
            $ref: '#/definitions/resources.DeleteUserResponse'
        "401":
          description: Token no proporcionado o inválido
          schema:
            $ref: '#/definitions/resources.UnauthorizedError'
        "403":
          description: Solo administradores pueden eliminar usuarios
          schema:
            $ref: '#/definitions/resources.ForbiddenError'
        "404":
          description: Usuario no encontrado
          schema:
            $ref: '#/definitions/resources.NotFoundError'
        "500":
          description: Error al eliminar el usuario
          schema:
            $ref: '#/definitions/resources.InternalServerError'
      security:
      - BearerAuth: []
      summary: Delete user (admin)
      tags:
      - Users
    get:
      description: Returns a single user's profile data. Admin only.
      parameters:
      - description: User ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Datos del usuario
          schema:
            $ref: '#/definitions/resources.GetUserResponse'
        "401":
          description: Token no proporcionado o inválido
          schema:
            $ref: '#/definitions/resources.UnauthorizedError'
        "403":
          description: Solo administradores pueden ver usuarios
          schema:
            $ref: '#/definitions/resources.ForbiddenError'
        "404":
          description: Usuario no encontrado
          schema:
            $ref: '#/definitions/resources.NotFoundError'
      security:
      - BearerAuth: []
      summary: Get user by ID (admin)
      tags:
      - Users
    put:
      consumes:
      - application/json
      description: Modifies a user's role, name, email, or other fields. Admin only.
      parameters:
      - description: User ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/services.UpdateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Usuario actualizado correctamente
          schema:
            $ref: '#/definitions/resources.UpdateUserResponse'
        "400":
          description: Datos inválidos en la solicitud
          schema:
            $ref: '#/definitions/resources.BadRequestError'
        "401":
          description: Token no proporcionado o inválido
          schema:
            $ref: '#/definitions/resources.UnauthorizedError'
        "403":
          description: Solo administradores pueden modificar usuarios
          schema:
            $ref: '#/definitions/resources.ForbiddenError'
        "404":
          description: Usuario no encontrado
          schema:
            $ref: '#/definitions/resources.NotFoundError'
        "500":
          description: Error al actualizar el usuario
          schema:
            $ref: '#/definitions/resources.InternalServerError'
      security:
      - BearerAuth: []
      summary: Update user (admin)
      tags:
      - Users
  /docs/es:
    get:
      description: |-
        Serves an interactive Swagger UI page configured to load the
        Spanish-translated OpenAPI spec from /api/v1/docs/es/spec.
        This is the Spanish documentation portal for the Voxlab API.
      produces:
      - text/html
      responses:
        "200":
          description: HTML page with Swagger UI
          schema:
            type: string
      summary: Serve Spanish Swagger UI
      tags:
      - Docs
securityDefinitions:
  BearerAuth:
    description: Type "Bearer " followed by your JWT token
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
tags:
- description: Authentication & user profile endpoints
  name: Auth
- description: Track (course) management endpoints
  name: Tracks
- description: Module management endpoints within tracks
  name: Modules
- description: Lesson management endpoints within modules
  name: Lessons
- description: Exercise management within lessons + text analysis
  name: Exercises
- description: User progress tracking (lesson completion, XP)
  name: Progress
- description: File upload endpoints (images, avatars)
  name: Upload
- description: Admin user management endpoints
  name: Users
- description: Feedback & reactions on exercises
  name: Reactions
- description: Health check and system endpoints
  name: System
- description: Swagger documentation endpoints
  name: Docs
