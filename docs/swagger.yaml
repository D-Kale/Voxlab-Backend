host: localhost:3000
info:
  contact:
    email: support@voxlab.com
    name: API Support
  description: API for the Voxlab public speaking educational platform
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://voxlab.com/terms
  title: Voxlab API
  version: "1.0"
paths:
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: |-
        Authenticates with email + password and returns a JWT token.
        The token must be sent as `Authorization: Bearer <token>` for protected endpoints.
        Tokens expire after 24 hours.
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/services.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Login exitoso — token + datos del usuario
          schema:
            $ref: '#/definitions/resources.LoginResponseData'
        "400":
          description: Credenciales inválidas o formato incorrecto
          schema:
            $ref: '#/definitions/resources.BadRequestError'
        "401":
          description: Email o contraseña incorrectos
          schema:
            $ref: '#/definitions/resources.UnauthorizedError'
      summary: User Login
      tags:
      - Auth
  /api/v1/auth/logout:
    post:
      description: |-
        Invalidates the current JWT token by adding it to a Redis blacklist.
        After calling this, the token can no longer be used for authenticated requests.
        The frontend should also discard the token locally.
      produces:
      - application/json
      responses:
        "200":
          description: Sesión cerrada correctamente
          schema:
            $ref: '#/definitions/resources.LogoutResponse'
        "401":
          description: Token no proporcionado o inválido
          schema:
            $ref: '#/definitions/resources.UnauthorizedError'
      security:
      - BearerAuth: []
      summary: User Logout
      tags:
      - Auth
  /api/v1/auth/me:
    get:
      description: |-
        Returns the authenticated user's profile (name, email, XP, streak, lives).
        Use this to verify the token is valid and load the user's data on page refresh.
      produces:
      - application/json
      responses:
        "200":
          description: Perfil del usuario autenticado
          schema:
            $ref: '#/definitions/resources.UserProfileResponse'
        "401":
          description: Token no proporcionado o inválido
          schema:
            $ref: '#/definitions/resources.UnauthorizedError'
        "404":
          description: Usuario no encontrado
          schema:
            $ref: '#/definitions/resources.NotFoundError'
        "500":
          description: Error al obtener el perfil
          schema:
            $ref: '#/definitions/resources.InternalServerError'
      security:
      - BearerAuth: []
      summary: Get Current User
      tags:
      - Auth
  /api/v1/auth/profile:
    get:
      description: |-
        Returns the authenticated user's extended profile (name, email, avatar_url, XP, streak, lives).
        Unlike /auth/me, this returns a richer profile object with all user-facing fields.
      produces:
      - application/json
      responses:
        "200":
          description: Perfil extendido del usuario
          schema:
