      description: "Creates an exercise inside a lesson. The \"type\" field determines
        the JSONB \"content\" structure.\n\n\U0001F4DD Supported exercise types and
        their content structure:\n\n**quiz** — Multiple choice questions (multi-pregunta):\n```json\n{\n\"type\":
        \"quiz\",\n\"content\": {\n\"questions\": [\n{\n\"question\": \"What is public
        speaking?\",\n\"options\": [\"Option A\", \"Option B\", \"Option C\", \"Option
        D\"],\n\"correct_index\": 0,\n\"explanation\": \"Option A is correct because...\"\n}\n],\n\"points_per_question\":
        10\n}\n}\n```\n\n**reading** — Reading passage:\n```json\n{\n\"type\": \"reading\",\n\"content\":
        {\n\"title\": \"The Art of Speech\",\n\"content\": \"Full reading text here...\",\n\"reading_time_seconds\":
        120,\n\"points\": 5\n}\n}\n```\n\n**oratory_minigame** — Oratory challenge
        with requirements:\n```json\n{\n\"type\": \"oratory_minigame\",\n\"content\":
        {\n\"prompt\": \"Record a 30-second speech about...\",\n\"topic\": \"Leadership\",\n\"duration_seconds\":
        30,\n\"min_duration_seconds\": 15,\n\"requirements\": [\"Clear introduction\",
        \"Use at least 3 key points\", \"Strong conclusion\"],\n\"points\": 20\n}\n}\n```\n\n**writing**
        — Writing exercise with requirements:\n```json\n{\n\"type\": \"writing\",\n\"content\":
        {\n\"prompt\": \"Write a 200-word essay about leadership\",\n\"min_words\":
        100,\n\"max_words\": 500,\n\"requirements\": [\"Include a thesis\", \"Support
        with examples\"],\n\"points\": 20\n}\n}\n```\n\n**audio** — Audio recording
        exercise:\n```json\n{\n\"type\": \"audio\",\n\"content\": {\n\"prompt\": \"Read
        this paragraph aloud...\",\n\"duration_seconds\": 60,\n\"points\": 15\n}\n}\n```\n\n**video**
        — Video recording exercise:\n```json\n{\n\"type\": \"video\",\n\"content\":
        {\n\"prompt\": \"Record a video introducing yourself...\",\n\"duration_seconds\":
        120,\n\"points\": 25\n}\n}\n```\n\n\U0001F512 Requires JWT token (Authorization:
        Bearer <token>)\nCreates an exercise inside a lesson. The \"type\" field determines
        the JSONB \"content\" structure.\n\n\U0001F4DD Supported exercise types and
        their content structure:\n\n**quiz** — Multiple choice questions (multi-pregunta):\n```json\n{\n\"type\":
        \"quiz\",\n\"content\": {\n\"questions\": [\n{\n\"question\": \"What is public
        speaking?\",\n\"options\": [\"Option A\", \"Option B\", \"Option C\", \"Option
        D\"],\n\"correct_index\": 0,\n\"explanation\": \"Option A is correct because...\"\n}\n],\n\"points_per_question\":
        10\n}\n}\n```\n\n**reading** — Reading passage:\n```json\n{\n\"type\": \"reading\",\n\"content\":
        {\n\"title\": \"The Art of Speech\",\n\"content\": \"Full reading text here...\",\n\"reading_time_seconds\":
        120,\n\"points\": 5\n}\n}\n```\n\n**oratory_minigame** — Oratory challenge
        with requirements:\n```json\n{\n\"type\": \"oratory_minigame\",\n\"content\":
        {\n\"prompt\": \"Record a 30-second speech about...\",\n\"topic\": \"Leadership\",\n\"duration_seconds\":
        30,\n\"min_duration_seconds\": 15,\n\"requirements\": [\"Clear introduction\",
        \"Use at least 3 key points\", \"Strong conclusion\"],\n\"points\": 20\n}\n}\n```\n\n**writing**
        — Writing exercise with requirements:\n```json\n{\n\"type\": \"writing\",\n\"content\":
        {\n\"prompt\": \"Write a 200-word essay about leadership\",\n\"min_words\":
        100,\n\"max_words\": 500,\n\"requirements\": [\"Include a thesis\", \"Support
        with examples\"],\n\"points\": 20\n}\n}\n```\n\n**audio** — Audio recording
        exercise:\n```json\n{\n\"type\": \"audio\",\n\"content\": {\n\"prompt\": \"Read
        this paragraph aloud...\",\n\"duration_seconds\": 60,\n\"points\": 15\n}\n}\n```\n\n**video**
        — Video recording exercise:\n```json\n{\n\"type\": \"video\",\n\"content\":
        {\n\"prompt\": \"Record a video introducing yourself...\",\n\"duration_seconds\":
        120,\n\"points\": 25\n}\n}\n```\n\n\U0001F512 Requires JWT token (Authorization:
        Bearer <token>)"
      parameters:
      - description: Exercise data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/controllers.CreateExerciseRequest'
      produces:
      - application/json
      - application/json
      responses:
