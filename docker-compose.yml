networks:
  voxlab:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  minio-data:
  nginx-logs:

services:
  # ── Backend API (Go) ──
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voxlab-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/voxlab?sslmode=disable
      - REDIS_URL=redis:6379
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-in-prod}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - AWS_REGION=us-east-1
      - AWS_ENDPOINT_URL=http://minio:9000
      - AWS_S3_BUCKET=voxlab
      - MINIO_PUBLIC_ENDPOINT=http://localhost:9010
      - ANALYZER_URL=http://analyzer:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      analyzer:
        condition: service_started
    networks:
      - voxlab
    restart: unless-stopped

  # ── Python Analyzer ──
  analyzer:
    build:
      context: ./analyzer
      dockerfile: Dockerfile
    container_name: voxlab-analyzer
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - voxlab
    restart: unless-stopped

  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    container_name: voxlab-postgres
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=voxlab
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - voxlab
    restart: unless-stopped

  # ── pgAdmin (dev only) ──
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: voxlab-pgadmin
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@voxlab.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    depends_on:
      - postgres
    networks:
      - voxlab
    restart: unless-stopped

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: voxlab-redis
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - voxlab
    restart: unless-stopped

  # ── MinIO (S3-compatible) ──
  minio:
    image: minio/minio:latest
    container_name: voxlab-minio
    ports:
      - "9010:9000"
      - "9011:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
      - MINIO_SERVER_URL=http://minio:9000
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - voxlab
    restart: unless-stopped

  # ── LiveKit ──
  livekit:
    image: livekit/livekit-server:latest
    container_name: voxlab-livekit
    command: --dev --bind 0.0.0.0
    ports:
      - "7883:7880"
      - "7884:7881"
    environment:
      LIVEKIT_API_KEY: devkey
      LIVEKIT_API_SECRET: secret
      LIVEKIT_KEYS: "devkey: secret"
    networks:
      - voxlab
    restart: unless-stopped

  # ── Frontend (Astro SSR) ──
  frontend:
    build:
      context: ../Frontend
      dockerfile: Dockerfile
      network: host
    container_name: voxlab-frontend
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
      - PUBLIC_API_URL=http://backend:3000/api/v1
      - PORT=3001
    depends_on:
      - backend
    networks:
      - voxlab
    restart: unless-stopped

  # ── nginx (reverse proxy) ──
  nginx:
    image: nginx:alpine
    container_name: voxlab-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
    networks:
      - voxlab
    restart: unless-stopped
