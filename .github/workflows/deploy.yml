name: Deploy Backend & Analyzer
on:
  push:
    branches: [ "main" ]
jobs:
  build-services:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # Compila la API de Go (Raíz del proyecto)
    - name: Build Go API
      uses: docker/build-push-action@v5
      with:
        context: .
        file: Dockerfile
        push: true
        tags: ghcr.io/${{ github.repository_owner }}/voxlab-backend:latest

    # Compila el Analyzer (Subcarpeta ./analyzer)
    - name: Build Python Analyzer
      uses: docker/build-push-action@v5
      with:
        context: ./analyzer
        file: ./analyzer/Dockerfile
        push: true
        tags: ghcr.io/${{ github.repository_owner }}/voxlab-analyzer:latest
