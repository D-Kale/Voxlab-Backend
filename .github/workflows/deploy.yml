name: Deploy Backend & Analyzer
on:
  push:
    branches: [ "master" ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Convert owner to lowercase
      id: repo_owner
      run: echo "owner=${OWNER,,}" >> $GITHUB_OUTPUT
      env:
        OWNER: ${{ github.repository_owner }}

    - uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build Go API
      uses: docker/build-push-action@v5
      with:
        context: .
        file: Dockerfile
        push: true
        tags: ghcr.io/${{ steps.repo_owner.outputs.owner }}/voxlab-backend:latest

    - name: Build Python Analyzer
      uses: docker/build-push-action@v5
      with:
        context: ./analyzer
        file: ./analyzer/Dockerfile
        push: true
        tags: ghcr.io/${{ steps.repo_owner.outputs.owner }}/voxlab-analyzer:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v4

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script_stop: true
        script: |
          cd /opt/voxlab 
          docker compose pull
          docker compose up -d --no-deps --force-recreate voxlab-backend voxlab-analyzer
          sleep 5
          curl -sf http://localhost:3000/api/v1/health || exit 1
